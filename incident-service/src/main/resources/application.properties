spring.application.name=incident-service
server.port=8082

# Configuración de la Base de Datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/bd_alerta_incidentes?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Registro en el Servidor Eureka (Configurar cuando la infraestructura esté lista)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Desactivar temporalmente el registro en Eureka
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false