<div class="container mt-5 mb-5" style="max-width:800px;">
  <div class="card-custom">
    <div class="titulo">
      <i class="fas fa-user-plus fs-4"></i>
      <h3>{{ isEdit ? 'Editar empleado' : 'Nuevo empleado' }}</h3>
    </div>
    <div class="p-4 p-md-5">
      <div *ngIf="success" class="alert alert-success">{{ success }}</div>
      <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

      <form (submit)="onSubmit()">
        <h5 class="section-title mt-0"><i class="fas fa-id-card"></i> Datos Personales</h5>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Nombre:</label>
            <input type="text" class="form-control" [(ngModel)]="empleado.nombre" name="nombre" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Apellido:</label>
            <input type="text" class="form-control" [(ngModel)]="empleado.apellido" name="apellido" required>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Email:</label>
            <input type="email" class="form-control" [(ngModel)]="empleado.email" name="email" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Teléfono:</label>
            <input type="text" class="form-control" maxlength="9" [(ngModel)]="empleado.telefono" name="telefono" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Sexo:</label>
          <select class="form-select" [(ngModel)]="empleado.sexo" name="sexo" required>
            <option value="">Seleccionar...</option>
            <option value="Masculino">Masculino</option>
            <option value="Femenino">Femenino</option>
          </select>
        </div>

        <h5 class="section-title"><i class="fas fa-briefcase"></i> Datos Laborales</h5>
        <div class="row">
          <div class="col-md-6 mb-3"><label class="form-label">Cargo:</label><input type="text" class="form-control" [(ngModel)]="empleado.cargo" name="cargo"></div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Departamento:</label>
            <select class="form-select" [(ngModel)]="empleado.departamento" name="departamento" required>
              <option value="">Seleccionar...</option>
              <option value="Operaciones">Operaciones</option>
              <option value="Tecnología">Tecnología</option>
              <option value="Gerencia">Gerencia</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3"><label class="form-label">Salario:</label><input type="number" step="0.01" class="form-control" [(ngModel)]="empleado.salario" name="salario"></div>
          <div class="col-md-6 mb-3"><label class="form-label">Fecha ingreso:</label><input type="date" class="form-control" [(ngModel)]="empleado.fecha" name="fecha"></div>
        </div>

        <div *ngIf="!isEdit || !tieneUsuario">
          <h5 class="section-title"><i class="fas fa-key"></i> Datos de Acceso</h5>
          <div *ngIf="tieneUsuario" class="alert alert-info mb-3" style="font-size:0.9rem;">
            <i class="fas fa-info-circle"></i> Este empleado ya tiene usuario de acceso.
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Usuario:</label>
              <input type="text" class="form-control" [(ngModel)]="username" name="user" placeholder="Ej: jdoe">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Contraseña:</label>
              <div class="input-group">
                <input [type]="showPass ? 'text' : 'password'" class="form-control" [(ngModel)]="password" name="pass" placeholder="Mín. 5 caracteres">
                <button type="button" class="btn-input-group" (click)="togglePass()"><i [class]="showPass ? 'fas fa-eye-slash' : 'fas fa-eye'"></i></button>
                <button type="button" class="btn-input-group-dark" (click)="generarPass()"><i class="fas fa-random"></i> Generar</button>
              </div>
            </div>
          </div>
        </div>

        <div class="mt-5 text-center d-flex gap-3 justify-content-center">
          <button type="submit" class="btn-green" [disabled]="loading">
            <i class="fas fa-save me-1"></i> {{ loading ? 'Guardando...' : 'Guardar Empleado' }}
          </button>
          <a class="btn-outline-custom" routerLink="/empleados"><i class="fas fa-times me-1"></i> Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
