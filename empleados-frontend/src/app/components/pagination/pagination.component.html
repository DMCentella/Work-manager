<div class="pagination-wrapper" *ngIf="totalPages > 1">
  <button class="page-btn" [class.disabled]="currentPage === 0" (click)="goTo(0)" [disabled]="currentPage === 0">
    <i class="fas fa-angle-double-left"></i>
  </button>
  <button class="page-btn" [class.disabled]="currentPage === 0" (click)="goTo(currentPage - 1)" [disabled]="currentPage === 0">
    <i class="fas fa-angle-left"></i>
  </button>
  <button *ngFor="let p of pages" class="page-btn" [class.active]="p === currentPage" (click)="goTo(p)">
    {{ p + 1 }}
  </button>
  <button class="page-btn" [class.disabled]="currentPage >= totalPages - 1" (click)="goTo(currentPage + 1)" [disabled]="currentPage >= totalPages - 1">
    <i class="fas fa-angle-right"></i>
  </button>
  <button class="page-btn" [class.disabled]="currentPage >= totalPages - 1" (click)="goTo(totalPages - 1)" [disabled]="currentPage >= totalPages - 1">
    <i class="fas fa-angle-double-right"></i>
  </button>
</div>
