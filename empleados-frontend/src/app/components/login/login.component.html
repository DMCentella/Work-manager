<nav class="navbar">
  <div class="container">
    <a class="navbar-brand" routerLink="/login">
      <i class="fas fa-building"></i> Gestión de Empleados
    </a>
  </div>
</nav>

<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <i class="fas fa-user-circle"></i>
      <h3>Inicio de sesión</h3>
    </div>
    <div class="login-body">
      <div *ngIf="error" class="alert alert-danger">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
      </div>
      <div *ngIf="success" class="alert alert-success">
        <i class="fas fa-check-circle"></i> {{ success }}
      </div>

      <form (submit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">Usuario</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-user"></i></span>
            <input type="text" class="form-control" [(ngModel)]="username" name="username" placeholder="Ingresa tu usuario" required>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input type="password" class="form-control" [(ngModel)]="password" name="password" placeholder="Ingresa tu contraseña" required>
          </div>
        </div>
        <button type="submit" class="btn-login-btn" [disabled]="loading">
          <i class="fas fa-sign-in-alt"></i> {{ loading ? 'Iniciando...' : 'Iniciar sesión' }}
        </button>
      </form>
    </div>
  </div>
</div>
